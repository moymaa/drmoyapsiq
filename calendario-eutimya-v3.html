<!DOCTYPE html>
<html lang="es" style="color-scheme:light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendar Consulta · Eutimya</title>

<style>
:root {
  --blue:        #1d1d1f;
  --blue-bg:     #e8f0fe;
  --green:       #188038;
  --green-bg:    #e6f4ea;
  --green-hover: #c6e8cc;
  --red:         #c5221f;
  --red-bg:      #fce8e6;
  --gray-50:     #f8f9fa;
  --gray-100:    #f1f3f4;
  --gray-200:    #e8eaed;
  --gray-400:    #bdc1c6;
  --gray-600:    #80868b;
  --gray-700:    #5f6368;
  --gray-900:    #202124;
  --white:       #ffffff;
  --radius:      8px;
  --shadow:      0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md:   0 4px 12px rgba(0,0,0,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--gray-50);
  font-family: 'Roboto', sans-serif;
  color: var(--gray-900);
  min-height: 100vh;
  padding: 0;
}

.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.topbar-logo {
  width: 40px; height: 40px;
  background: var(--blue);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-family: 'Google Sans', sans-serif;
  font-size: 17px; font-weight: 600;
  flex-shrink: 0;
}
.topbar-info h1 {
  font-family: 'Google Sans', sans-serif;
  font-size: 16px; font-weight: 500;
  color: var(--gray-900);
  line-height: 1.2;
}
.topbar-info p {
  font-size: 12px;
  color: var(--gray-600);
  margin-top: 1px;
}

.page { max-width: 700px; margin: 0 auto; padding: 24px 16px 60px; }

.type-row {
  display: flex;
  gap: 0;
  margin-bottom: 20px;
  border: 1px solid var(--gray-200);
  border-radius: 24px;
  background: var(--white);
  padding: 4px;
  width: fit-content;
  box-shadow: var(--shadow);
}
.type-btn {
  padding: 9px 22px;
  border-radius: 20px;
  border: none;
  background: transparent;
  font-family: 'Google Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  color: var(--gray-700);
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.type-btn.active {
  background: var(--blue);
  color: var(--white);
  box-shadow: var(--shadow);
}
.type-btn:hover:not(.active) { background: var(--gray-100); }

.breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--gray-600);
  margin-bottom: 12px;
  min-height: 22px;
}
.breadcrumb .crumb {
  color: var(--blue); cursor: pointer; font-weight: 500;
}
.breadcrumb .crumb:hover { text-decoration: underline; }
.breadcrumb .sep { color: var(--gray-400); }

.card {
  background: var(--white);
  border-radius: 12px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-head {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; justify-content: space-between;
}
.card-head h2 {
  font-family: 'Google Sans', sans-serif;
  font-size: 17px; font-weight: 500;
  color: var(--gray-900);
  text-transform: capitalize;
}
.card-body { padding: 20px 24px 24px; }

.months-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.month-tile {
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 16px 12px 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.month-tile:hover:not(.past) {
  border-color: var(--blue);
  background: var(--blue-bg);
}
.month-tile.past {
  opacity: 0.38;
  pointer-events: none;
  cursor: default;
}
.month-tile .mt-name {
  font-family: 'Google Sans', sans-serif;
  font-size: 15px; font-weight: 500;
  color: var(--gray-900);
}
.month-tile .mt-year {
  font-size: 12px; color: var(--gray-600);
  margin-top: 1px;
}
.month-tile .mt-count {
  font-size: 12px;
  margin-top: 6px;
  font-weight: 500;
}
.mt-count.has { color: var(--green); }
.mt-count.none { color: var(--red); font-weight: 500; }
.month-tile.no-avail {
  background: var(--red-bg);
  border-color: rgba(197,34,31,0.3);
  pointer-events: none;
  cursor: default;
}

/* Botón regresar */
.btn-back {
  display: inline-flex; align-items: center; gap: 5px;
  background: none; border: none; padding: 0 0 14px 0;
  font-family: 'Google Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  color: var(--blue); cursor: pointer;
}
.btn-back:hover { text-decoration: underline; }

.dow-row {
  display: grid; grid-template-columns: repeat(7,1fr);
  margin-bottom: 6px;
}
.dow-lbl {
  text-align: center;
  font-size: 11px; font-weight: 500;
  color: var(--gray-600);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 4px 0;
}

.days-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }

.day {
  aspect-ratio: 1;
  border-radius: var(--radius);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 14px; font-weight: 500;
  position: relative;
  transition: all 0.12s;
}
.day.empty { pointer-events: none; }
.day.past { background: var(--gray-100); color: var(--gray-400); pointer-events: none; }
.day.off   { background: var(--gray-100); color: var(--gray-400); pointer-events: none; }
.day.avail {
  background: var(--green-bg);
  color: var(--green);
  cursor: pointer;
  border: 1px solid rgba(24,128,56,0.15);
}
.day.avail:hover {
  background: var(--green-hover);
  transform: scale(1.05);
  box-shadow: 0 2px 6px rgba(24,128,56,0.18);
  z-index: 1;
}
.day.busy {
  background: var(--red-bg);
  color: var(--red);
  border: 1px solid rgba(197,34,31,0.12);
  pointer-events: none;
}
.day.today-ring { outline: 2px solid var(--blue); outline-offset: -2px; }
.day-num  { font-size: 15px; line-height: 1; }
.day-sub  { font-size: 10px; margin-top: 2px; line-height: 1; font-weight: 400; }

.legend {
  display: flex; flex-wrap: wrap; gap: 14px;
  margin-top: 18px; padding-top: 16px;
  border-top: 1px solid var(--gray-200);
}
.leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--gray-700); }
.leg-sq { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
.leg-sq.g { background: var(--green-bg); border: 1px solid rgba(24,128,56,0.3); }
.leg-sq.r { background: var(--red-bg);   border: 1px solid rgba(197,34,31,0.2);  }
.leg-sq.e { background: var(--gray-100); border: 1px solid var(--gray-200); }

.slots-date {
  font-family: 'Google Sans', sans-serif;
  font-size: 15px; font-weight: 500;
  color: var(--gray-900);
  text-transform: capitalize;
  margin-bottom: 16px;
}
.slots-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(105px,1fr));
  gap: 8px;
}
.slot {
  padding: 11px 8px;
  border-radius: var(--radius);
  text-align: center;
  transition: all 0.12s;
}
.slot.free {
  background: var(--green-bg);
  border: 1px solid rgba(24,128,56,0.2);
  color: var(--green);
  cursor: pointer;
}
.slot.free:hover {
  background: var(--green-hover);
  transform: translateY(-2px);
  box-shadow: 0 3px 8px rgba(24,128,56,0.18);
}
.slot.busy {
  background: var(--red-bg);
  border: 1px solid rgba(197,34,31,0.15);
  color: var(--red);
  cursor: default;
  opacity: 0.75;
}
.slot-t { display: block; font-size: 15px; font-weight: 500; }
.slot-l { display: block; font-size: 11px; margin-top: 2px; font-weight: 400; }

.loading { display: flex; justify-content: center; padding: 48px; }
.spinner {
  width: 30px; height: 30px;
  border: 3px solid var(--gray-200);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.view { animation: fadeUp 0.2s ease; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:none; }
}

@media (max-width: 500px) {
  .months-grid { grid-template-columns: repeat(2,1fr); }
  .card-body   { padding: 14px 14px 18px; }
  .card-head   { padding: 14px 14px 12px; }
  .day-sub     { display: none; }
  .slots-grid  { grid-template-columns: repeat(3,1fr); }
  .topbar      { padding: 12px 16px; }
}

/* ════════════════════════════════════════════
   APPLE DESIGN SYSTEM — Glass & Polish Layer
   ════════════════════════════════════════════ */

/* 1. Body & base */
body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
h1,h2,h3,h4,h5,h6{letter-spacing:-0.018em;font-weight:700}
p,li,td{letter-spacing:-.005em}

/* 2. Navigation — Apple frosted glass */
.nav{
  background:rgba(255,255,255,.72) !important;
  backdrop-filter:saturate(180%) blur(20px) !important;
  -webkit-backdrop-filter:saturate(180%) blur(20px) !important;
  border-bottom:1px solid rgba(0,0,0,.07) !important;
  box-shadow:none !important;
}
/* Nav CTA — Apple blue pill */
.nav-btn{
  background:#1d1d1f !important;
  border-radius:980px !important;
  box-shadow:0 2px 12px rgba(0,0,0,.14) !important;
  letter-spacing:-.01em !important;
  text-transform:none !important;
  font-size:.82rem !important;
}
.nav-btn:hover{background:#000000 !important;opacity:1 !important}

/* 3. Mobile nav glass */
.mobile-nav{
  background:rgba(255,255,255,.9) !important;
  backdrop-filter:saturate(180%) blur(24px) !important;
  -webkit-backdrop-filter:saturate(180%) blur(24px) !important;
  border-top:none !important;
  box-shadow:0 20px 60px rgba(0,0,0,.14) !important;
}
.mobile-nav-group-items a::before{background:#c7c7cc !important}
.mnav-cta-primary{
  background:#1d1d1f !important;
  border-radius:980px !important;
  box-shadow:0 2px 10px rgba(0,0,0,.12) !important;
}
.mnav-cta-secondary{border-radius:980px !important}

/* 4. Floating action buttons — Apple glass */
.wa-float{
  background:rgba(37,211,102,.9) !important;
  backdrop-filter:blur(20px) saturate(180%) !important;
  -webkit-backdrop-filter:blur(20px) saturate(180%) !important;
  border:1px solid rgba(255,255,255,.3) !important;
  border-radius:980px !important;
  box-shadow:0 8px 32px rgba(37,211,102,.3),0 2px 8px rgba(0,0,0,.1) !important;
}
.wa-float:hover{
  transform:translateY(-2px) !important;
  box-shadow:0 12px 40px rgba(37,211,102,.38),0 4px 12px rgba(0,0,0,.12) !important;
}
.back-to-top{
  background:rgba(29,29,31,.5) !important;
  backdrop-filter:blur(20px) saturate(180%) !important;
  -webkit-backdrop-filter:blur(20px) saturate(180%) !important;
  border:1px solid rgba(255,255,255,.16) !important;
  box-shadow:0 4px 20px rgba(0,0,0,.2) !important;
}
.back-to-top:hover{
  background:rgba(29,29,31,.7) !important;
  box-shadow:0 8px 28px rgba(0,0,0,.28) !important;
}

/* 5. Primary CTA buttons */
.btn-gold,.hmo-btn-main{
  background:#1d1d1f !important;
  border-radius:980px !important;
  box-shadow:0 4px 20px rgba(0,0,0,.15) !important;
  letter-spacing:-.01em !important;
}
.btn-gold:hover,.hmo-btn-main:hover{
  background:#000000 !important;
  box-shadow:0 6px 28px rgba(0,0,0,.18) !important;
  filter:none !important;
  transform:translateY(-1px) !important;
}

/* btn-main (dark CTA) */
.btn-main{
  background:#1d1d1f !important;
  border-radius:980px !important;
  box-shadow:0 4px 18px rgba(0,0,0,.15) !important;
}
.btn-main:hover{background:#2d2d2f !important}

/* btn-wa (outline) → apple glass */
.btn-wa{
  background:rgba(0,0,0,.04) !important;
  border:1px solid rgba(0,0,0,.1) !important;
  border-radius:980px !important;
  color:#1d1d1f !important;
}
.btn-wa:hover{background:rgba(0,0,0,.08) !important;border-color:rgba(0,0,0,.18) !important}

/* hmo-btn-wa glass (on dark hero) */
.hmo-btn-wa{
  background:rgba(255,255,255,.1) !important;
  backdrop-filter:blur(12px) !important;
  -webkit-backdrop-filter:blur(12px) !important;
  border:1px solid rgba(255,255,255,.22) !important;
  border-radius:980px !important;
  color:#fff !important;
}
.hmo-btn-wa:hover{background:rgba(255,255,255,.2) !important}

/* page-hero-back (secondary pages back button) */
.page-hero-back{
  background:rgba(255,255,255,.1) !important;
  backdrop-filter:blur(16px) !important;
  -webkit-backdrop-filter:blur(16px) !important;
  border:1px solid rgba(255,255,255,.25) !important;
  border-radius:980px !important;
  color:#fff !important;
}
.page-hero-back:hover{background:rgba(255,255,255,.2) !important}

/* 6. Cards — subtle Apple style */
.svc,.price-card,.cuando-item,.pub,.review,.pay-card,.cred-thumb{
  border-radius:18px !important;
  border:1px solid rgba(0,0,0,.06) !important;
  box-shadow:0 2px 8px rgba(0,0,0,.04) !important;
}
.svc:hover,.price-card:hover,.cuando-item:hover,.pay-card:hover,.cred-thumb:hover{
  transform:none !important;
  box-shadow:0 8px 40px rgba(0,0,0,.1) !important;
  border-color:rgba(0,0,0,.1) !important;
}
/* Card hover accent line — blue */
.svc::after{background:linear-gradient(90deg,#1d1d1f,#424245) !important}

/* pill/chip elements */
.cred-chip,.cert-chip,.zone,.enlace-pill{
  border-radius:980px !important;
  background:rgba(0,0,0,.05) !important;
  color:#1d1d1f !important;
  border-color:rgba(0,0,0,.08) !important;
}
.cred-chip:hover,.cert-chip:hover{background:#1d1d1f !important;color:#fff !important;border-color:#1d1d1f !important}
.cond,.act-item,.transfer-acc,.pay-pill,.chip{border-radius:12px !important}

/* 7. Featured price card glass */
.price-card.featured{
  background:linear-gradient(135deg,rgba(0,113,227,.05),rgba(0,113,227,.01)) !important;
  border-color:rgba(0,0,0,.1) !important;
}

/* 8. Dark sections — rich Apple black */
.hospitals,.cta-band,.footer,.enlace-block{background:#1d1d1f !important}
.footer-brand img{filter:brightness(0) invert(1)}
.nav-logo img{filter:none !important}

/* enlace-block glass inset */
.enlace-block{
  background:rgba(255,255,255,.06) !important;
  backdrop-filter:blur(12px) !important;
  -webkit-backdrop-filter:blur(12px) !important;
  border:1px solid rgba(255,255,255,.1) !important;
}

/* geo-cta-card */
.geo-cta-card{
  background:rgba(255,255,255,.07) !important;
  backdrop-filter:blur(12px) !important;
  -webkit-backdrop-filter:blur(12px) !important;
  border:1px solid rgba(255,255,255,.12) !important;
  border-radius:14px !important;
}
.geo-cred-card{border-radius:14px !important}

/* hero-cred glass */
.hero-cred{
  background:rgba(255,255,255,.08) !important;
  backdrop-filter:blur(16px) !important;
  -webkit-backdrop-filter:blur(16px) !important;
  border:1px solid rgba(255,255,255,.15) !important;
  border-radius:16px !important;
}

/* 9. CTA radial glow — blue tint */
.cta-band::before{background:radial-gradient(ellipse 60% 80% at center,rgba(0,0,0,.05),transparent 70%) !important}

/* 10. Ticker — neutral Apple gray */
.ticker-wrap{background:#f5f5f7;border-top:1px solid rgba(0,0,0,.05);border-bottom:1px solid rgba(0,0,0,.05)}
.ticker-label{color:#86868b !important}
.ticker-dot{background:#c7c7cc !important}
.ticker-sep{color:#d1d1d6 !important}
.ticker-name{color:#1d1d1f}
.ticker-sub{color:#86868b}

/* 11. Decorative dots — neutral (NOT blue) */
.lead-dot,.cred-dot{background:#c7c7cc !important}
.cond-bullet{background:#c7c7cc !important}
.cond-bullet,.cond:hover .cond-bullet{background:#1d1d1f !important}/* keep on hover blue */
.price-row::before{color:#30d158 !important}
.geo-eeat-check{color:#30d158 !important}

/* 12. Eyebrows — kept blue (Apple product category style) */
.eyebrow,.hosp-eyebrow,.enlace-label,.geo-cta-label,.act-type,.page-eyebrow{
  color:#6e6e73 !important;
  letter-spacing:.05em !important;
}

/* 13. Section header sizing */
.section-h{font-size:clamp(2rem,3.5vw,2.8rem) !important;letter-spacing:-.025em !important}

/* 14. Footer links hover */
.footer-col a:hover{color:#1d1d1f !important}

/* 15. btn-price */
.btn-price-main{border-radius:980px !important;background:#1d1d1f !important}
.btn-price-ghost{border-radius:980px !important;background:transparent !important;border:1px solid rgba(0,0,0,.12) !important;color:#1d1d1f !important}
.btn-price-ghost:hover{background:rgba(0,0,0,.05) !important}

/* 16. pay-card-btn */
.pay-card-btn{border-radius:980px !important;background:#1d1d1f !important}

/* 17. copy-btn (pagos) */
.copy-btn{border-radius:12px !important;background:#1d1d1f !important}

/* 18. Map wrap */
.map-wrap{border-radius:18px !important;border:1px solid rgba(0,0,0,.07) !important}

/* 19. WA float & back-to-top pill */
.wa-float,.back-to-top{border-radius:980px !important}

/* 20. link.html glass buttons */
.link-btn{
  background:rgba(255,255,255,.1) !important;
  backdrop-filter:blur(12px) !important;
  -webkit-backdrop-filter:blur(12px) !important;
  border:1px solid rgba(255,255,255,.18) !important;
  border-radius:16px !important;
  color:#fff !important;
}
.link-btn:hover{background:rgba(255,255,255,.2) !important}
.link-btn.primary,.link-btn[href*="cita"]{
  background:rgba(29,29,31,.85) !important;
  border-color:rgba(255,255,255,.25) !important;
}
.ico-btn{
  background:rgba(255,255,255,.1) !important;
  backdrop-filter:blur(12px) !important;
  -webkit-backdrop-filter:blur(12px) !important;
  border:1px solid rgba(255,255,255,.15) !important;
  border-radius:16px !important;
}
.ico-btn:hover{background:rgba(255,255,255,.2) !important}

/* 21. calendar page glass cards (cita.html) */
.cal-card{
  background:rgba(255,255,255,.08) !important;
  backdrop-filter:blur(16px) !important;
  -webkit-backdrop-filter:blur(16px) !important;
  border:1px solid rgba(255,255,255,.15) !important;
  border-radius:20px !important;
}

/* 22. transfer-acc (pagos) */
.transfer-acc{
  border-color:rgba(0,0,0,.1) !important;
  border-radius:14px !important;
  background:rgba(0,0,0,.03) !important;
}
.transfer-sum{color:#1d1d1f !important}

/* 23. Confirmacion / factura page specific */
.step-circle,.step-line,.progress-bar{background:#1d1d1f !important}

/* 24. Section header h2 bold */
.hosp-title,.cta-inner h2{letter-spacing:-.025em}

/* 25. bio-mini card */
.bio-mini{border-radius:18px !important;border:1px solid rgba(0,0,0,.06) !important}
.bio-mini-eyebrow{color:#1d1d1f !important}

/* 26. review stars — keep amber */
.review-stars{color:#f59e0b}
.ct-ok{color:#30d158}

/* 27. Hospital pills */
.hosp-pill{
  background:rgba(255,255,255,.07) !important;
  border:1px solid rgba(255,255,255,.1) !important;
  border-radius:14px !important;
  backdrop-filter:blur(8px) !important;
  -webkit-backdrop-filter:blur(8px) !important;
}
.hosp-pill:hover{background:rgba(255,255,255,.14) !important}

/* 28. compare-table header */
.compare-table th{background:#1d1d1f !important}

/* 29. nav dropdown */
.nav-drop-menu{
  border-radius:14px !important;
  border:1px solid rgba(0,0,0,.08) !important;
  box-shadow:0 8px 40px rgba(0,0,0,.12) !important;
  backdrop-filter:blur(20px) !important;
  -webkit-backdrop-filter:blur(20px) !important;
}
.nav-drop-menu a:hover{background:#f5f5f7 !important}

/* 30. FAQ icon */
.faq-item.open .faq-icon{background:#1d1d1f !important;border-color:#1d1d1f !important}
.faq-q:hover{color:#6e6e73 !important}

</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">E</div>
  <div class="topbar-info">
    <h1>Eutimya · Agendar consulta</h1>
    <p>Dr. Deldhy Moya · Citas de 50 min · CDMX (GMT-6)</p>
  </div>
</div>

<div class="page">
  <div class="type-row">
    <button class="type-btn active" id="btn-presencial" onclick="setType('presencial',event)">📍 Presencial</button>
    <button class="type-btn" id="btn-online" onclick="setType('online',event)">💻 Online</button>
  </div>
  <div class="breadcrumb" id="bc"></div>
  <div class="card">
    <div class="card-head"><h2 id="cardTitle">Selecciona un mes</h2></div>
    <div class="card-body" id="cardBody">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script>
const CFG = {
  PROXY:       'https://script.google.com/macros/s/AKfycbxT4MaXgIzLtJcVOCrbDtcCXM8Ut55CAoVbT5bzAfDEG31JAbkkkz51wTx_kbZqh4DY/exec',
  CAL_ID:      'deldhym@gmail.com',
  PAY_URL:     'https://eutimya.org/pagos',
  DURATION:    50,
  TZ:          'America/Mexico_City',
  AHEAD_MONTHS: 12,
  MIN_HOURS_BEFORE: 12,

  // dow: 0=Lun 1=Mar 2=Mié 3=Jue 4=Vie 5=Sáb 6=Dom
  SCHED: {
    presencial: {
      0: ['09:00','10:00','11:00','12:00','13:00'],
      1: ['09:00','10:00','11:00','12:00','13:00'],
      2: ['09:00','10:00','11:00','12:00','13:00'],
      3: ['09:00','10:00','11:00','12:00','13:00'],
      4: ['09:00','10:00','11:00','12:00','13:00'],
      5: ['10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00'],
      6: ['12:00','13:00','14:00','15:00','16:00','17:00']
    },
    online: {
      0: ['09:00','10:00','11:00','12:00','13:00','20:30'],
      1: ['09:00','10:00','11:00','12:00','13:00','20:30'],
      2: ['09:00','10:00','11:00','12:00','13:00','20:30'],
      3: ['09:00','10:00','11:00','12:00','13:00','20:30'],
      4: ['09:00','10:00','11:00','12:00','13:00','20:30'],
      5: [],
      6: []
    }
  }
};

const S = {
  view: 'months',
  type: 'presencial',
  selMonth: null,
  selDate:  null,
  busy: {},
};

const NOW   = new Date();
const TODAY = new Date(NOW); TODAY.setHours(0,0,0,0);

const MN = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
            'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DN = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

const dow  = d => (d.getDay()+6)%7;
const mKey = (y,m) => `${y}-${String(m+1).padStart(2,'0')}`;
const dKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

function slots(date) {
  const times = CFG.SCHED[S.type][dow(date)] || [];
  const cutoff = new Date(NOW.getTime() + CFG.MIN_HOURS_BEFORE * 3600000);
  return times.filter(t => {
    const [h,m] = t.split(':').map(Number);
    const dt = new Date(date); dt.setHours(h,m,0,0);
    return dt > cutoff;
  });
}

function isBusy(date, t) {
  const mk = mKey(date.getFullYear(), date.getMonth());
  const [h,m] = t.split(':').map(Number);
  const ss = new Date(date); ss.setHours(h,m,0,0);
  const se = new Date(ss);   se.setMinutes(se.getMinutes()+CFG.DURATION);
  return (S.busy[mk]||[]).some(b => ss < b.end && se > b.start);
}

function dayStatus(date) {
  const all = slots(date);
  if (!all.length) return { free:0 };
  const free = all.filter(t => !isBusy(date,t)).length;
  return { free };
}

async function fetchBusy(y,m) {
  const mk = mKey(y,m);
  if (S.busy[mk] !== undefined) return;
  if (!CFG.PROXY || CFG.PROXY.indexOf('script.google.com') === -1) { S.busy[mk]=[]; return; }
  try {
    const r = await fetch(`${CFG.PROXY}?y=${y}&m=${m}`);
    const d = await r.json();
    S.busy[mk] = (d.busy||[]).map(b=>({start:new Date(b.start),end:new Date(b.end)}));
  } catch { S.busy[mk]=[]; }
}

function renderBC() {
  const bc = document.getElementById('bc');
  const tn = S.type==='presencial'?'Presencial':'Online';
  if (S.view==='months') { bc.innerHTML=''; return; }
  if (S.view==='days') {
    const {y,m} = S.selMonth;
    bc.innerHTML=`<span class="crumb" onclick="goMonths()">${tn}</span>
      <span class="sep">›</span><span>${MN[m]} ${y}</span>`;
  }
  if (S.view==='slots') {
    const lbl = S.selDate.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});
    bc.innerHTML=`<span class="crumb" onclick="goMonths()">${tn}</span>
      <span class="sep">›</span>
      <span class="crumb" onclick="goDays()">${MN[S.selMonth.m]}</span>
      <span class="sep">›</span>
      <span style="text-transform:capitalize">${lbl}</span>`;
  }
}

function setTitle(t) { document.getElementById('cardTitle').textContent = t; }
function setBody(h)  { document.getElementById('cardBody').innerHTML = h; }
function showSpin()  { setBody('<div class="loading"><div class="spinner"></div></div>'); }

function renderMonths() {
  S.view='months'; S.selDate=null;
  setTitle('Selecciona un mes'); renderBC();

  const base = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
  let html = '<div class="months-grid view">';

  for (let i=0; i<CFG.AHEAD_MONTHS; i++) {
    const d  = new Date(base); d.setMonth(d.getMonth()+i);
    const y  = d.getFullYear(), m = d.getMonth();
    const past = d < base;

    let totalSlots = 0;
    if (!past) {
      const cutoff = new Date(NOW.getTime() + CFG.MIN_HOURS_BEFORE * 3600000);
      const days = new Date(y,m+1,0).getDate();
      for (let day=1; day<=days; day++) {
        const dd = new Date(y,m,day);
        if (dd < TODAY) continue;
        const sched = CFG.SCHED[S.type][dow(dd)] || [];
        if (dd.getTime() === TODAY.getTime()) {
          totalSlots += sched.filter(t => {
            const [h,mn] = t.split(':').map(Number);
            const dt = new Date(dd); dt.setHours(h,mn,0,0);
            return dt > cutoff;
          }).length;
        } else {
          totalSlots += sched.length;
        }
      }
    }

    const noAvail = !past && totalSlots === 0;
    html += `<div class="month-tile${past?' past':''}${noAvail?' no-avail':''}" onclick="${(!past&&!noAvail)?'selMonth('+y+','+m+')':''}">
      <div class="mt-name">${MN[m]}</div>
      <div class="mt-year">${y}</div>
      <div class="mt-count ${totalSlots>0?'has':'none'}">
        ${past?'—':totalSlots>0?totalSlots+' horarios':'Sin disponibilidad'}
      </div>
    </div>`;
  }
  html += '</div>';
  setBody(html);
}

async function renderDays() {
  S.view='days'; S.selDate=null;
  const {y,m} = S.selMonth;
  setTitle(`${MN[m]} ${y}`); renderBC(); showSpin();
  await fetchBusy(y,m);

  const dim    = new Date(y,m+1,0).getDate();
  const first  = dow(new Date(y,m,1));
  const todayK = dKey(TODAY);

  let html = '<div class="view">';
  html += `<button class="btn-back" onclick="goMonths()">← Meses</button>`;
  html += '<div class="dow-row">';
  DN.forEach(l=>{ html+=`<div class="dow-lbl">${l}</div>`; });
  html += '</div><div class="days-grid">';

  for (let i=0;i<first;i++) html += '<div class="day empty"></div>';

  for (let d=1;d<=dim;d++) {
    const date  = new Date(y,m,d);
    const dk    = dKey(date);
    const isPast= date < TODAY;
    const isToday = dk===todayK;
    const times = CFG.SCHED[S.type][dow(date)]||[];
    const todayRing = isToday?' today-ring':'';

    if (isPast) {
      html+=`<div class="day past${todayRing}"><span class="day-num">${d}</span></div>`;
    } else if (!times.length) {
      html+=`<div class="day off${todayRing}"><span class="day-num">${d}</span><span class="day-sub">No disp.</span></div>`;
    } else {
      const {free} = dayStatus(date);
      if (free===0) {
        html+=`<div class="day busy${todayRing}"><span class="day-num">${d}</span><span class="day-sub">Ocupado</span></div>`;
      } else {
        html+=`<div class="day avail${todayRing}" onclick="selDay(${y},${m},${d})">
          <span class="day-num">${d}</span>
          <span class="day-sub">${free} libre${free!==1?'s':''}</span>
        </div>`;
      }
    }
  }
  html += '</div>';
  html += `<div class="legend">
    <div class="leg"><div class="leg-sq g"></div>Disponible</div>
    <div class="leg"><div class="leg-sq r"></div>No disponible / Ocupado</div>
    <div class="leg"><div class="leg-sq e"></div>Fecha pasada</div>
  </div></div>`;
  setBody(html);
}

function renderSlots() {
  S.view='slots';
  const date = S.selDate;
  const lbl  = date.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  setTitle('Selecciona un horario'); renderBC();

  const all = slots(date);
  let html = '<div class="view">';
  html += `<button class="btn-back" onclick="goDays()">← ${MN[S.selMonth.m]} ${S.selMonth.y}</button>`;
  html += `<div class="slots-date" style="text-transform:capitalize">${lbl}</div>`;

  if (!all.length) {
    html += '<p style="color:var(--gray-600);font-size:14px;">Sin horarios disponibles.</p>';
  } else {
    html += '<div class="slots-grid">';
    all.forEach(t => {
      const busy = isBusy(date,t);
      if (busy) {
        html+=`<div class="slot busy"><span class="slot-t">${t}</span><span class="slot-l">No disponible</span></div>`;
      } else {
        html+=`<button class="slot free" onclick="selSlot('${t}')"><span class="slot-t">${t}</span><span class="slot-l">Disponible</span></button>`;
      }
    });
    html += '</div>';
  }

  html += `<div class="legend" style="margin-top:16px;">
    <div class="leg"><div class="leg-sq g"></div>Disponible — clic para reservar</div>
    <div class="leg"><div class="leg-sq r"></div>No disponible</div>
  </div></div>`;
  setBody(html);
}

function setType(type,e) {
  S.type=type; S.busy={};
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  e.currentTarget.classList.add('active');
  goMonths();
}

function selMonth(y,m) { S.selMonth={y,m}; renderDays(); }
function selDay(y,m,d) { S.selDate=new Date(y,m,d); S.selMonth={y,m}; renderSlots(); }
function selSlot(t) {
  const d = S.selDate;
  const p = new URLSearchParams({ tipo: S.type, fecha: dKey(d), hora: t });
  window.location.href = `${CFG.PAY_URL}?${p}`;
}
function goMonths() { S.selDate=null; renderMonths(); }
function goDays()   { S.selDate=null; renderDays(); }

renderMonths();
</script>
</body>
</html>
