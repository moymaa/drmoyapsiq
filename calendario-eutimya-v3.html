<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendar Consulta · Eutimya</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --blue:        #1a73e8;
  --blue-bg:     #e8f0fe;
  --green:       #188038;
  --green-bg:    #e6f4ea;
  --green-hover: #c6e8cc;
  --red:         #c5221f;
  --red-bg:      #fce8e6;
  --gray-50:     #f8f9fa;
  --gray-100:    #f1f3f4;
  --gray-200:    #e8eaed;
  --gray-400:    #bdc1c6;
  --gray-600:    #80868b;
  --gray-700:    #5f6368;
  --gray-900:    #202124;
  --white:       #ffffff;
  --radius:      8px;
  --shadow:      0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md:   0 4px 12px rgba(0,0,0,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--gray-50);
  font-family: 'Roboto', sans-serif;
  color: var(--gray-900);
  min-height: 100vh;
  padding: 0;
}

/* ─── TOP BAR (like Google Calendar booking) ─── */
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.topbar-logo {
  width: 40px; height: 40px;
  background: var(--blue);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-family: 'Google Sans', sans-serif;
  font-size: 17px; font-weight: 600;
  flex-shrink: 0;
}
.topbar-info h1 {
  font-family: 'Google Sans', sans-serif;
  font-size: 16px; font-weight: 500;
  color: var(--gray-900);
  line-height: 1.2;
}
.topbar-info p {
  font-size: 12px;
  color: var(--gray-600);
  margin-top: 1px;
}

/* ─── LAYOUT ─── */
.page { max-width: 700px; margin: 0 auto; padding: 24px 16px 60px; }

/* ─── TYPE SELECTOR ─── */
.type-row {
  display: flex;
  gap: 0;
  margin-bottom: 20px;
  border: 1px solid var(--gray-200);
  border-radius: 24px;
  background: var(--white);
  padding: 4px;
  width: fit-content;
  box-shadow: var(--shadow);
}
.type-btn {
  padding: 9px 22px;
  border-radius: 20px;
  border: none;
  background: transparent;
  font-family: 'Google Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  color: var(--gray-700);
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.type-btn.active {
  background: var(--blue);
  color: var(--white);
  box-shadow: var(--shadow);
}
.type-btn:hover:not(.active) { background: var(--gray-100); }

/* ─── BREADCRUMB ─── */
.breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--gray-600);
  margin-bottom: 12px;
  min-height: 22px;
}
.breadcrumb .crumb {
  color: var(--blue); cursor: pointer; font-weight: 500;
}
.breadcrumb .crumb:hover { text-decoration: underline; }
.breadcrumb .sep { color: var(--gray-400); }

/* ─── CARD ─── */
.card {
  background: var(--white);
  border-radius: 12px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-head {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; justify-content: space-between;
}
.card-head h2 {
  font-family: 'Google Sans', sans-serif;
  font-size: 17px; font-weight: 500;
  color: var(--gray-900);
  text-transform: capitalize;
}
.card-body { padding: 20px 24px 24px; }

/* ─── MONTHS GRID ─── */
.months-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.month-tile {
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 16px 12px 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.month-tile:hover:not(.past) {
  border-color: var(--blue);
  background: var(--blue-bg);
}
.month-tile.past {
  opacity: 0.38;
  pointer-events: none;
  cursor: default;
}
.month-tile .mt-name {
  font-family: 'Google Sans', sans-serif;
  font-size: 15px; font-weight: 500;
  color: var(--gray-900);
}
.month-tile .mt-year {
  font-size: 12px; color: var(--gray-600);
  margin-top: 1px;
}
.month-tile .mt-count {
  font-size: 12px;
  margin-top: 6px;
  font-weight: 500;
}
.mt-count.has { color: var(--green); }
.mt-count.none { color: var(--gray-600); font-weight: 400; }

/* ─── CALENDAR GRID ─── */
.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px;
}
.nav-icon {
  width: 36px; height: 36px;
  border-radius: 50%; border: none;
  background: transparent;
  color: var(--gray-700);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s;
}
.nav-icon:hover { background: var(--gray-100); }
.cal-month-label {
  font-family: 'Google Sans', sans-serif;
  font-size: 16px; font-weight: 500;
  color: var(--gray-900);
  text-transform: capitalize;
}

.dow-row {
  display: grid; grid-template-columns: repeat(7,1fr);
  margin-bottom: 6px;
}
.dow-lbl {
  text-align: center;
  font-size: 11px; font-weight: 500;
  color: var(--gray-600);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 4px 0;
}

.days-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }

.day {
  aspect-ratio: 1;
  border-radius: var(--radius);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 14px; font-weight: 500;
  position: relative;
  transition: all 0.12s;
}
.day.empty { pointer-events: none; }
.day.past { background: var(--gray-100); color: var(--gray-400); pointer-events: none; }
.day.off   { background: var(--gray-100); color: var(--gray-400); pointer-events: none; }

.day.avail {
  background: var(--green-bg);
  color: var(--green);
  cursor: pointer;
  border: 1px solid rgba(24,128,56,0.15);
}
.day.avail:hover {
  background: var(--green-hover);
  transform: scale(1.05);
  box-shadow: 0 2px 6px rgba(24,128,56,0.18);
  z-index: 1;
}
.day.busy {
  background: var(--red-bg);
  color: var(--red);
  border: 1px solid rgba(197,34,31,0.12);
  pointer-events: none;
}
.day.today-ring { outline: 2px solid var(--blue); outline-offset: -2px; }

.day-num  { font-size: 15px; line-height: 1; }
.day-sub  { font-size: 10px; margin-top: 2px; line-height: 1; font-weight: 400; }

/* ─── LEGEND ─── */
.legend {
  display: flex; flex-wrap: wrap; gap: 14px;
  margin-top: 18px; padding-top: 16px;
  border-top: 1px solid var(--gray-200);
}
.leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--gray-700); }
.leg-sq {
  width: 14px; height: 14px; border-radius: 3px;
  flex-shrink: 0;
}
.leg-sq.g { background: var(--green-bg); border: 1px solid rgba(24,128,56,0.3); }
.leg-sq.r { background: var(--red-bg);   border: 1px solid rgba(197,34,31,0.2);  }
.leg-sq.e { background: var(--gray-100); border: 1px solid var(--gray-200); }

/* ─── SLOTS ─── */
.slots-date {
  font-family: 'Google Sans', sans-serif;
  font-size: 15px; font-weight: 500;
  color: var(--gray-900);
  text-transform: capitalize;
  margin-bottom: 16px;
}
.slots-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(105px,1fr));
  gap: 8px;
}
.slot {
  padding: 11px 8px;
  border-radius: var(--radius);
  text-align: center;
  transition: all 0.12s;
}
.slot.free {
  background: var(--green-bg);
  border: 1px solid rgba(24,128,56,0.2);
  color: var(--green);
  cursor: pointer;
}
.slot.free:hover {
  background: var(--green-hover);
  transform: translateY(-2px);
  box-shadow: 0 3px 8px rgba(24,128,56,0.18);
}
.slot.busy {
  background: var(--red-bg);
  border: 1px solid rgba(197,34,31,0.15);
  color: var(--red);
  cursor: default;
  opacity: 0.75;
}
.slot-t { display: block; font-size: 15px; font-weight: 500; }
.slot-l { display: block; font-size: 11px; margin-top: 2px; font-weight: 400; }

/* ─── LOADING ─── */
.loading { display: flex; justify-content: center; padding: 48px; }
.spinner {
  width: 30px; height: 30px;
  border: 3px solid var(--gray-200);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── ANIM ─── */
.view { animation: fadeUp 0.2s ease; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:none; }
}

/* ─── MOBILE ─── */
@media (max-width: 500px) {
  .months-grid { grid-template-columns: repeat(2,1fr); }
  .card-body   { padding: 14px 14px 18px; }
  .card-head   { padding: 14px 14px 12px; }
  .day-sub     { display: none; }
  .slots-grid  { grid-template-columns: repeat(3,1fr); }
  .topbar      { padding: 12px 16px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">E</div>
  <div class="topbar-info">
    <h1>Eutimya · Agendar consulta</h1>
    <p>Dr. Deldhy Moya · Citas de 50 min · CDMX (GMT-6)</p>
  </div>
</div>

<div class="page">

  <!-- TYPE SELECTOR -->
  <div class="type-row">
    <button class="type-btn active" id="btn-presencial" onclick="setType('presencial',event)">
      📍 Presencial
    </button>
    <button class="type-btn" id="btn-online" onclick="setType('online',event)">
      💻 Online
    </button>
  </div>

  <!-- BREADCRUMB -->
  <div class="breadcrumb" id="bc"></div>

  <!-- CARD -->
  <div class="card">
    <div class="card-head">
      <h2 id="cardTitle">Selecciona un mes</h2>
    </div>
    <div class="card-body" id="cardBody">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

</div><!-- /page -->

<script>
// ══════════════════════════════════════
//  CONFIG  ← solo edita esta sección
// ══════════════════════════════════════
const CFG = {
  PROXY:       'https://script.google.com/macros/s/AKfycbw0qMZYdatYDDcgmmRYEtkoYmzclsIWB48KlvNJvD09H8TrQOcpg3cRVeBmFUEFSzP9yw/exec',   // ← pega aquí la URL de tu GAS deployment
  CAL_ID:      'deldhym@gmail.com',
  PAY_URL:     'https://eutimya.org/pagos',
  DURATION:    50,          // minutos por cita
  TZ:          'America/Mexico_City',
  AHEAD_MONTHS: 12,
  MIN_HOURS_BEFORE: 6,      // no agendar con menos de 6 h de anticipación

  // dow: 0=Lun 1=Mar 2=Mié 3=Jue 4=Vie 5=Sáb 6=Dom
  SCHED: {
    presencial: {
      0: [{s:'09:00',e:'13:00'},{s:'13:20',e:'14:10'}],
      1: [{s:'09:00',e:'13:00'},{s:'13:20',e:'14:10'}],
      2: [{s:'09:00',e:'13:00'},{s:'13:20',e:'14:10'}],
      3: [{s:'09:00',e:'13:00'},{s:'13:20',e:'14:10'}],
      4: [{s:'09:00',e:'13:00'},{s:'13:20',e:'14:10'}],
      5: [{s:'09:00',e:'18:00'}],
      6: [{s:'10:00',e:'18:00'}],
    },
    online: {
      0: [{s:'09:00',e:'13:00'},{s:'13:20',e:'14:10'},{s:'20:30',e:'21:30'}],
      1: [{s:'09:00',e:'13:00'},{s:'13:20',e:'14:10'},{s:'20:30',e:'21:30'}],
      2: [{s:'09:00',e:'13:00'},{s:'13:20',e:'14:10'},{s:'20:30',e:'21:30'}],
      3: [{s:'09:00',e:'13:00'},{s:'13:20',e:'14:10'},{s:'20:30',e:'21:30'}],
      4: [{s:'09:00',e:'13:00'},{s:'13:20',e:'14:10'},{s:'20:30',e:'21:30'}],
      5: [],
      6: [],
    }
  }
};

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
const S = {
  view: 'months',
  type: 'presencial',
  selMonth: null,   // {y,m}
  selDate:  null,   // Date
  busy: {},         // {'YYYY-MM': [{start,end}]}
};

const NOW   = new Date();
const TODAY = new Date(NOW); TODAY.setHours(0,0,0,0);

const MN = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
            'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DN = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

// ══════════════════════════════════════
//  UTILS
// ══════════════════════════════════════
const dow   = d => (d.getDay()+6)%7;
const toMin = t => { const[h,m]=t.split(':').map(Number); return h*60+m; };
const fmMin = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const mKey  = (y,m) => `${y}-${String(m+1).padStart(2,'0')}`;
const dKey  = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

function slots(date) {
  const blocks = CFG.SCHED[S.type][dow(date)] || [];
  const out = [];
  blocks.forEach(b => {
    let c = toMin(b.s), end = toMin(b.e);
    while (c + CFG.DURATION <= end) { out.push(fmMin(c)); c += CFG.DURATION; }
  });
  // Filter by min hours before
  const cutoff = new Date(NOW.getTime() + CFG.MIN_HOURS_BEFORE*3600000);
  return out.filter(t => {
    const [h,m] = t.split(':').map(Number);
    const dt = new Date(date); dt.setHours(h,m,0,0);
    return dt > cutoff;
  });
}

function isBusy(date, t) {
  const mk = mKey(date.getFullYear(), date.getMonth());
  const [h,m] = t.split(':').map(Number);
  const ss = new Date(date); ss.setHours(h,m,0,0);
  const se = new Date(ss);   se.setMinutes(se.getMinutes()+CFG.DURATION);
  return (S.busy[mk]||[]).some(b => ss < b.end && se > b.start);
}

function dayStatus(date) {
  const all = slots(date);
  if (!all.length) return { total:0, free:0 };
  const free = all.filter(t => !isBusy(date,t)).length;
  return { total:all.length, free };
}

// ══════════════════════════════════════
//  FREEBUSY API
// ══════════════════════════════════════
async function fetchBusy(y,m) {
  const mk = mKey(y,m);
  if (S.busy[mk] !== undefined) return;
  if (!CFG.PROXY || CFG.PROXY.indexOf('script.google.com') === -1) { S.busy[mk]=[]; return; }
  try {
    const r = await fetch(`${CFG.PROXY}?y=${y}&m=${m}`);
    const d = await r.json();
    S.busy[mk] = (d.busy||[])
      .map(b=>({start:new Date(b.start),end:new Date(b.end)}));
  } catch { S.busy[mk]=[]; }
}

// ══════════════════════════════════════
//  BREADCRUMB
// ══════════════════════════════════════
function renderBC() {
  const bc = document.getElementById('bc');
  const tn = S.type==='presencial'?'Presencial':'Online';
  if (S.view==='months') { bc.innerHTML=''; return; }
  if (S.view==='days') {
    const {y,m} = S.selMonth;
    bc.innerHTML=`<span class="crumb" onclick="goMonths()">${tn}</span>
      <span class="sep">›</span>
      <span>${MN[m]} ${y}</span>`;
  }
  if (S.view==='slots') {
    const lbl = S.selDate.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});
    bc.innerHTML=`<span class="crumb" onclick="goMonths()">${tn}</span>
      <span class="sep">›</span>
      <span class="crumb" onclick="goDays()">${MN[S.selMonth.m]}</span>
      <span class="sep">›</span>
      <span style="text-transform:capitalize">${lbl}</span>`;
  }
}

// ══════════════════════════════════════
//  VIEWS
// ══════════════════════════════════════
function setTitle(t) { document.getElementById('cardTitle').textContent = t; }
function setBody(h)  { document.getElementById('cardBody').innerHTML = h; }
function showSpin()  { setBody('<div class="loading"><div class="spinner"></div></div>'); }

/* — MONTHS — */
function renderMonths() {
  S.view='months'; S.selDate=null;
  setTitle('Selecciona un mes'); renderBC();

  const base = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
  let html = '<div class="months-grid view">';

  for (let i=0; i<CFG.AHEAD_MONTHS; i++) {
    const d  = new Date(base); d.setMonth(d.getMonth()+i);
    const y  = d.getFullYear(), m = d.getMonth();
    const past = d < base;

    // Count available days
    let avail = 0;
    if (!past) {
      const days = new Date(y,m+1,0).getDate();
      for (let day=1; day<=days; day++) {
        const dd = new Date(y,m,day);
        if (dd < TODAY) continue;
        if ((CFG.SCHED[S.type][dow(dd)]||[]).length > 0) avail++;
      }
    }

    html += `<div class="month-tile${past?' past':''}" onclick="selMonth(${y},${m})">
      <div class="mt-name">${MN[m]}</div>
      <div class="mt-year">${y}</div>
      <div class="mt-count ${avail>0?'has':'none'}">
        ${past?'—':avail>0?avail+' días disp.':'Sin disponibilidad'}
      </div>
    </div>`;
  }
  html += '</div>';
  setBody(html);
}

/* — DAYS — */
async function renderDays() {
  S.view='days'; S.selDate=null;
  const {y,m} = S.selMonth;
  setTitle(`${MN[m]} ${y}`); renderBC(); showSpin();
  await fetchBusy(y,m);

  const dim    = new Date(y,m+1,0).getDate();
  const first  = dow(new Date(y,m,1));
  const todayK = dKey(TODAY);

  let html = '<div class="view">';
  // DOW labels
  html += '<div class="dow-row">';
  DN.forEach(l=>{ html+=`<div class="dow-lbl">${l}</div>`; });
  html += '</div><div class="days-grid">';

  for (let i=0;i<first;i++) html += '<div class="day empty"></div>';

  for (let d=1;d<=dim;d++) {
    const date  = new Date(y,m,d);
    const dk    = dKey(date);
    const isPast= date < TODAY;
    const isToday = dk===todayK;
    const blocks= CFG.SCHED[S.type][dow(date)]||[];
    const todayRing = isToday?' today-ring':'';

    if (isPast) {
      html+=`<div class="day past${todayRing}"><span class="day-num">${d}</span></div>`;
    } else if (!blocks.length) {
      html+=`<div class="day off${todayRing}"><span class="day-num">${d}</span><span class="day-sub">No disp.</span></div>`;
    } else {
      const {free} = dayStatus(date);
      if (free===0) {
        html+=`<div class="day busy${todayRing}"><span class="day-num">${d}</span><span class="day-sub">Ocupado</span></div>`;
      } else {
        html+=`<div class="day avail${todayRing}" onclick="selDay(${y},${m},${d})">
          <span class="day-num">${d}</span>
          <span class="day-sub">${free} libre${free!==1?'s':''}</span>
        </div>`;
      }
    }
  }
  html += '</div>';

  // Legend
  html += `<div class="legend">
    <div class="leg"><div class="leg-sq g"></div>Disponible</div>
    <div class="leg"><div class="leg-sq r"></div>No disponible / Ocupado</div>
    <div class="leg"><div class="leg-sq e"></div>Fecha pasada</div>
  </div></div>`;

  setBody(html);
}

/* — SLOTS — */
function renderSlots() {
  S.view='slots';
  const date = S.selDate;
  const lbl  = date.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  setTitle('Selecciona un horario'); renderBC();

  const all = slots(date);
  let html = '<div class="view">';
  html += `<div class="slots-date" style="text-transform:capitalize">${lbl}</div>`;

  if (!all.length) {
    html += '<p style="color:var(--gray-600);font-size:14px;">Sin horarios disponibles.</p>';
  } else {
    html += '<div class="slots-grid">';
    all.forEach(t => {
      const busy = isBusy(date,t);
      if (busy) {
        html+=`<div class="slot busy"><span class="slot-t">${t}</span><span class="slot-l">No disponible</span></div>`;
      } else {
        html+=`<button class="slot free" onclick="selSlot('${t}')"><span class="slot-t">${t}</span><span class="slot-l">Disponible</span></button>`;
      }
    });
    html += '</div>';
  }

  html += `<div class="legend" style="margin-top:16px;">
    <div class="leg"><div class="leg-sq g"></div>Disponible — clic para reservar</div>
    <div class="leg"><div class="leg-sq r"></div>No disponible</div>
  </div></div>`;

  setBody(html);
}

// ══════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════
function setType(type,e) {
  S.type=type; S.busy={};
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  e.currentTarget.classList.add('active');
  goMonths();
}

function selMonth(y,m) {
  S.selMonth={y,m};
  renderDays();
}

function selDay(y,m,d) {
  S.selDate = new Date(y,m,d);
  S.selMonth = {y,m};
  renderSlots();
}

function selSlot(t) {
  const d = S.selDate;
  const p = new URLSearchParams({
    tipo: S.type,
    fecha: dKey(d),
    hora: t
  });
  window.location.href = `${CFG.PAY_URL}?${p}`;
}

function goMonths() { S.selDate=null; renderMonths(); }
function goDays()   { S.selDate=null; renderDays(); }

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
renderMonths();
</script>
</body>
